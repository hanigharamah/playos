kind = "web"
previewPath = "/"
title = "PlayOS"
version = "1.0.0"
id = "artifacts/playos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26205

[services.development]
run = "pnpm --filter @workspace/playos run dev"

[services.production]

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/playos run build && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "26205"
BASE_PATH = "/"
