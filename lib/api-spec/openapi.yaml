          format: date-time
        weekEnd:
          type: string
          format: date-time
        paidPlayerCount:
          type: integer
        netPayout:
          type: number
        nextPayoutDate:
          type: string
          format: date-time
      required:
        - weekStart
        - weekEnd
        - paidPlayerCount
        - netPayout
        - nextPayoutDate

    PayoutsResponse:
      type: object
      properties:
        weekly:
          $ref: "#/components/schemas/WeeklyPayout"
        allTimeGross:
          type: number
        upcomingGames:
          type: array
          items:
            $ref: "#/components/schemas/DashboardGame"
        payoutDetails:
          $ref: "#/components/schemas/PayoutDetails"
      required:
        - weekly
        - allTimeGross
        - upcomingGames

    PayoutDetailsBody:
