kind = "web"
previewPath = "/"
title = "PlayOS"
version = "1.0.0"
id = "artifacts/playos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26205

[services.development]
run = "pnpm --filter @workspace/playos run dev"

[services.production]

[services.production.build]
args = ["pnpm", "run", "build:production"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "start"]

[services.production.run.env]
NODE_ENV = "production"
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "26205"
BASE_PATH = "/"
