kind = "web"
previewPath = "/"
title = "PlayOS"
version = "1.0.0"
id = "artifacts/playos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26205

[services.development]
run = "pnpm --filter @workspace/playos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/playos", "run", "build" ]
publicDir = "artifacts/playos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26205"
BASE_PATH = "/"
